<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureExam Dashboard</title>
  <style>
    :root {
      --bg: #09111d;
      --bg-accent: radial-gradient(circle at top left, rgba(33, 105, 255, 0.22), transparent 32%), radial-gradient(circle at top right, rgba(255, 91, 121, 0.16), transparent 28%), #09111d;
      --surface: rgba(12, 20, 34, 0.86);
      --surface-2: rgba(20, 30, 48, 0.92);
      --surface-3: rgba(28, 41, 61, 0.94);
      --border: rgba(161, 181, 214, 0.16);
      --text: #edf4ff;
      --muted: #97a6bd;
      --dim: #6d7c92;
      --primary: #57a6ff;
      --success: #4dd599;
      --warning: #ffbf5f;
      --danger: #ff7b72;
      --critical: #ff5d7d;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      --radius: 20px;
      --font: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --mono: Consolas, "Courier New", monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg-accent);
      color: var(--text);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-main {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      inset: auto -10% -45% 30%;
      height: 220px;
      background: linear-gradient(90deg, rgba(87, 166, 255, 0.18), rgba(255, 93, 125, 0.12));
      filter: blur(40px);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(87, 166, 255, 0.26);
      border-radius: 999px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(87, 166, 255, 0.08);
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(34px, 4.4vw, 54px);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .hero-copy {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .hero-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .hero-side {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-side h2,
    .section-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .feed-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .feed-top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .feed-title {
      font-size: 13px;
      font-weight: 700;
    }

    .feed-meta,
    .tiny {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }

    .stat-sub {
      color: var(--dim);
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 0.95fr);
      gap: 20px;
    }

    .table-panel {
      padding: 20px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .input,
    .select,
    .button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 14px;
    }

    .input { min-width: 220px; }
    .input:focus,
    .select:focus,
    .button:focus {
      outline: none;
      border-color: rgba(87, 166, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(87, 166, 255, 0.12);
    }

    .button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(87, 166, 255, 0.18), rgba(87, 166, 255, 0.08));
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.04);
    }

    .table-shell {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface-2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
      font-size: 13px;
    }

    tbody tr:hover td {
      background: rgba(87, 166, 255, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .candidate {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .candidate strong {
      font-size: 14px;
    }

    .mono {
      font-family: var(--mono);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-active { background: rgba(77, 213, 153, 0.14); color: var(--success); border-color: rgba(77, 213, 153, 0.28); }
    .status-completed { background: rgba(87, 166, 255, 0.15); color: var(--primary); border-color: rgba(87, 166, 255, 0.28); }
    .status-cancelled { background: rgba(255, 93, 125, 0.18); color: var(--critical); border-color: rgba(255, 93, 125, 0.28); }
    .sev-low { background: rgba(77, 213, 153, 0.14); color: var(--success); border-color: rgba(77, 213, 153, 0.24); }
    .sev-medium { background: rgba(255, 191, 95, 0.15); color: var(--warning); border-color: rgba(255, 191, 95, 0.24); }
    .sev-high { background: rgba(255, 123, 114, 0.16); color: var(--danger); border-color: rgba(255, 123, 114, 0.24); }
    .sev-critical { background: rgba(255, 93, 125, 0.22); color: var(--critical); border-color: rgba(255, 93, 125, 0.32); }

    .risk-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .risk-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 18px currentColor;
    }

    .link-button {
      color: var(--primary);
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      border: none;
      background: none;
      padding: 0;
      font: inherit;
    }

    .side-panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kpi-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .kpi-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .kpi-item strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }

    .empty,
    .loading {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 20, 0.78);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal {
      width: min(1120px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: rgba(8, 15, 27, 0.97);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .modal-head {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .detail-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface-2);
      padding: 18px;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .detail-stat {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .detail-stat .value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 4px;
    }

    .breakdown,
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row-item,
    .timeline-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    .row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 90px 96px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .timeline-message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .timeline-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .video-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    .video-link:hover { text-decoration: underline; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1180px) {
      .hero,
      .workspace,
      .modal-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page { padding: 16px; }
      .stats-grid,
      .detail-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .timeline-item {
        grid-template-columns: 1fr;
      }
      .input { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page" id="app">
    <div class="loading panel">
      <div class="spinner"></div>
      <div>Dang ket noi Supabase va tai du lieu giam sat...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://oyfsjrywxxfndcwjyopi.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95ZnNqcnl3eHhmbmRjd2p5b3BpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDU5MTIsImV4cCI6MjA5MzQ4MTkxMn0.kaJmzXFiPNu84RtMFW2TM6w5MpRLCYGvD8qzlSLSNJw";
    async function supabaseSelect(table, query = {}) {
      const params = new URLSearchParams();
      params.set("select", query.select || "*");

      if (query.filters) {
        for (const [key, value] of Object.entries(query.filters)) {
          params.set(key, value);
        }
      }

      if (query.order) {
        const orderValue = `${query.order.column}.${query.order.ascending === false ? "desc" : "asc"}`;
        params.set("order", orderValue);
      }

      if (query.limit) {
        params.set("limit", String(query.limit));
      }

      const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params.toString()}`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          Accept: "application/json"
        }
      });

      if (!response.ok) {
        let message = response.statusText;
        try {
          const data = await response.json();
          message = data.message || data.error || message;
        } catch {
          // ignore json parse errors
        }
        throw new Error(message);
      }

      return response.json();
    }

    const EVENT_LABELS = {
      app_focus_lost: "Roi cua so thi",
      fullscreen_exit: "Thoat fullscreen",
      blocked_shortcut: "Phim tat bi chan",
      blacklisted_process: "Ung dung bi cam",
      multi_monitor_blocked: "Da man hinh truoc khi thi",
      multi_monitor_connected: "Gan them man hinh",
      vm_detected: "Phat hien may ao",
      no_face: "Khong thay khuon mat",
      multiple_faces: "Nhieu khuon mat",
      identity_mismatch: "Sai dinh danh",
      voice_overlap: "Nhieu nguoi noi cung luc",
      ai_cheating_mild: "Doc nham / tieng noi nho",
      ai_cheating_l1: "Noi chuyen bat thuong",
      ai_cheating_l2: "Nghi nhac bai",
      exam_cancelled: "Huy bai thi",
      exam_auto_submit: "Nop bai tu dong",
      exam_submitted: "Thi sinh nop bai",
      url_blocked: "URL bi chan",
      popup_attempt: "Mo popup",
      process_killed: "Dong app bi cam"
    };

    const state = {
      sessions: [],
      filteredSessions: [],
      recentCritical: [],
      search: "",
      status: "",
      risk: "all"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "—";
      return new Date(value).toLocaleString("vi-VN");
    }

    function formatTime(value) {
      if (!value) return "—";
      return new Date(value).toLocaleTimeString("vi-VN");
    }

    function formatDuration(session) {
      if (!session.started_at) return "—";
      const end = session.ended_at ? new Date(session.ended_at) : new Date();
      const start = new Date(session.started_at);
      const seconds = Math.max(0, Math.round((end - start) / 1000));
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const remain = seconds % 60;
      if (hours > 0) return `${hours}h ${minutes}m`;
      if (minutes > 0) return `${minutes}m ${remain}s`;
      return `${remain}s`;
    }

    function riskForSession(session) {
      if (session.is_cancelled || (session.critical_count || 0) > 0) {
        return { key: "critical", label: "Critical", color: "var(--critical)" };
      }
      if ((session.high_count || 0) > 0) {
        return { key: "high", label: "High", color: "var(--danger)" };
      }
      if ((session.medium_count || 0) > 0 || (session.tab_switch_count || 0) > 0) {
        return { key: "medium", label: "Watch", color: "var(--warning)" };
      }
      return { key: "low", label: "Clean", color: "var(--success)" };
    }

    function statusClass(status) {
      return `status-${status || "completed"}`;
    }

    function severityClass(severity) {
      return `sev-${severity || "low"}`;
    }

    function applyFilters() {
      state.filteredSessions = state.sessions.filter((session) => {
        const q = state.search.trim().toLowerCase();
        const risk = riskForSession(session);
        const matchesSearch = !q
          || (session.user_name || "").toLowerCase().includes(q)
          || (session.user_email || "").toLowerCase().includes(q)
          || (session.session_id || "").toLowerCase().includes(q);
        const matchesStatus = !state.status || session.status === state.status;
        const matchesRisk = state.risk === "all" || risk.key === state.risk;
        return matchesSearch && matchesStatus && matchesRisk;
      });
    }

    function buildOverview() {
      const totalSessions = state.sessions.length;
      const activeSessions = state.sessions.filter((item) => item.status === "active").length;
      const cancelledSessions = state.sessions.filter((item) => item.is_cancelled).length;
      const totalViolations = state.sessions.reduce((sum, item) => sum + (item.total_violations || 0), 0);
      const criticalViolations = state.sessions.reduce(
        (sum, item) => sum + (item.critical_count || 0) + (item.high_count || 0),
        0
      );
      const monitoredSessions = state.sessions.filter((item) => (item.total_violations || 0) > 0).length;
      const recentSession = state.sessions[0];

      return `
        <div class="hero">
          <section class="panel hero-main">
            <div class="eyebrow">SecureExam Live</div>
            <h1>Giam sat vi pham theo tung session, tung su kien, tung clip.</h1>
            <div class="hero-copy">
              Dashboard nay doc truc tiep tu Supabase de tong hop phien thi, muc do rui ro,
              va timeline vi pham. Clip video se xuat hien o cac su kien nghiem trong da duoc ghi bang rolling buffer.
            </div>
            <div class="hero-foot">
              <div class="pill"><strong>${totalSessions}</strong><span>tong session</span></div>
              <div class="pill"><strong>${totalViolations}</strong><span>tong log vi pham</span></div>
              <div class="pill"><strong>${criticalViolations}</strong><span>high + critical</span></div>
              <div class="pill"><strong>${recentSession ? formatDate(recentSession.started_at) : "—"}</strong><span>lan cap nhat moi nhat</span></div>
            </div>
          </section>

          <aside class="panel hero-side">
            <h2>Recent Critical Feed</h2>
            <div class="feed">
              ${state.recentCritical.length === 0 ? `
                <div class="feed-item">
                  <div class="feed-title">Chua co su kien high / critical</div>
                  <div class="feed-meta">Khi xuat hien vi pham nghiem trong, danh sach nay se cap nhat tuc thi.</div>
                </div>
              ` : state.recentCritical.map((item) => `
                <div class="feed-item">
                  <div class="feed-top">
                    <div class="feed-title">${escapeHtml(EVENT_LABELS[item.event_type] || item.event_type)}</div>
                    <span class="badge ${severityClass(item.severity)}">${escapeHtml(item.severity)}</span>
                  </div>
                  <div class="feed-meta">${escapeHtml(item.message || item.session_id)}</div>
                  <div class="tiny">${formatDate(item.occurred_at)}</div>
                </div>
              `).join("")}
            </div>
          </aside>
        </div>

        <section class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Active Sessions</div>
            <div class="stat-value" style="color: var(--success)">${activeSessions}</div>
            <div class="stat-sub">Dang thi ngay luc nay</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Cancelled</div>
            <div class="stat-value" style="color: var(--critical)">${cancelledSessions}</div>
            <div class="stat-sub">Bi huy hoac auto-cancel</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Monitored</div>
            <div class="stat-value" style="color: var(--warning)">${monitoredSessions}</div>
            <div class="stat-sub">Session co it nhat 1 violation</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Violations</div>
            <div class="stat-value" style="color: var(--primary)">${totalViolations}</div>
            <div class="stat-sub">Tong hop tu exam_summary</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Critical Count</div>
            <div class="stat-value" style="color: var(--critical)">${state.sessions.reduce((sum, item) => sum + (item.critical_count || 0), 0)}</div>
            <div class="stat-sub">Level nguy hiem nhat</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">High Count</div>
            <div class="stat-value" style="color: var(--danger)">${state.sessions.reduce((sum, item) => sum + (item.high_count || 0), 0)}</div>
            <div class="stat-sub">Can xem lai ngay</div>
          </div>
        </section>
      `;
    }

    function buildMainSection() {
      return `
        <section class="workspace">
          <div class="panel table-panel">
            <div class="toolbar">
              <div class="toolbar-left">
                <div class="section-title">Session Overview</div>
                <div class="tiny">${state.filteredSessions.length} / ${state.sessions.length} session hien thi</div>
              </div>
              <div class="toolbar-right">
                <input class="input" type="text" value="${escapeHtml(state.search)}" placeholder="Tim theo ten, email, session id" oninput="setSearch(this.value)">
                <select class="select" onchange="setStatus(this.value)">
                  <option value="" ${state.status === "" ? "selected" : ""}>Tat ca trang thai</option>
                  <option value="active" ${state.status === "active" ? "selected" : ""}>Dang thi</option>
                  <option value="completed" ${state.status === "completed" ? "selected" : ""}>Hoan thanh</option>
                  <option value="cancelled" ${state.status === "cancelled" ? "selected" : ""}>Da huy</option>
                </select>
                <select class="select" onchange="setRisk(this.value)">
                  <option value="all" ${state.risk === "all" ? "selected" : ""}>Tat ca muc rui ro</option>
                  <option value="critical" ${state.risk === "critical" ? "selected" : ""}>Critical</option>
                  <option value="high" ${state.risk === "high" ? "selected" : ""}>High</option>
                  <option value="medium" ${state.risk === "medium" ? "selected" : ""}>Watch</option>
                  <option value="low" ${state.risk === "low" ? "selected" : ""}>Clean</option>
                </select>
                <button class="button" onclick="loadData()">Lam moi</button>
              </div>
            </div>

            <div class="table-shell">
              <table>
                <thead>
                  <tr>
                    <th>Thi sinh</th>
                    <th>Trang thai</th>
                    <th>Risk</th>
                    <th>Tong VP</th>
                    <th>Critical / High</th>
                    <th>Tab switch</th>
                    <th>Duration</th>
                    <th>Started</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  ${state.filteredSessions.length === 0 ? `
                    <tr><td colspan="9" class="empty">Khong co session nao khop bo loc hien tai.</td></tr>
                  ` : state.filteredSessions.map((session) => {
                    const risk = riskForSession(session);
                    return `
                      <tr>
                        <td>
                          <div class="candidate">
                            <strong>${escapeHtml(session.user_name || "Chua co ten")}</strong>
                            <span class="tiny">${escapeHtml(session.user_email || "Khong co email")}</span>
                            <span class="mono">${escapeHtml(session.session_id || "")}</span>
                          </div>
                        </td>
                        <td><span class="badge ${statusClass(session.status)}">${escapeHtml(session.status || "completed")}</span></td>
                        <td>
                          <div class="risk-cell">
                            <span class="risk-dot" style="background:${risk.color};color:${risk.color}"></span>
                            <span>${risk.label}</span>
                          </div>
                        </td>
                        <td class="mono">${session.total_violations || 0}</td>
                        <td class="mono">${session.critical_count || 0} / ${session.high_count || 0}</td>
                        <td class="mono">${session.tab_switch_count || 0}</td>
                        <td>${formatDuration(session)}</td>
                        <td class="tiny">${formatDate(session.started_at)}</td>
                        <td><button class="link-button" onclick="showDetail('${escapeHtml(session.session_id)}')">Mo chi tiet</button></td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>

          <aside class="panel side-panel">
            <div>
              <div class="section-title">Rui Ro Tong Quan</div>
              <div class="tiny" style="margin-top: 8px">
                Muc risk duoc suy ra tu tong violation, trang thai session va cac su kien high / critical.
              </div>
            </div>

            <div class="kpi-list">
              ${[
                ["Critical Sessions", state.sessions.filter((item) => riskForSession(item).key === "critical").length, "Can mo timeline va video ngay", "var(--critical)"],
                ["High Risk Sessions", state.sessions.filter((item) => riskForSession(item).key === "high").length, "Khuyen nghi review thu cong", "var(--danger)"],
                ["Watch Sessions", state.sessions.filter((item) => riskForSession(item).key === "medium").length, "Co dau hieu can theo doi", "var(--warning)"],
                ["Clean Sessions", state.sessions.filter((item) => riskForSession(item).key === "low").length, "Khong co dau hieu bat thuong", "var(--success)"]
              ].map(([label, value, copy, color]) => `
                <div class="kpi-item">
                  <div class="tiny">${label}</div>
                  <strong style="color:${color}">${value}</strong>
                  <div class="tiny">${copy}</div>
                </div>
              `).join("")}
            </div>
          </aside>
        </section>
      `;
    }

    function renderApp() {
      applyFilters();
      document.getElementById("app").innerHTML = `${buildOverview()}${buildMainSection()}`;
    }

    async function loadData() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="loading panel">
          <div class="spinner"></div>
          <div>Dang tai session va feed high / critical...</div>
        </div>
      `;

      try {
        const [sessions, critical] = await Promise.all([
          supabaseSelect("exam_summary", {
            order: { column: "started_at", ascending: false }
          }),
          supabaseSelect("exam_violations", {
            select: "id,session_id,event_type,severity,message,occurred_at",
            filters: {
              severity: "in.(high,critical)"
            },
            order: { column: "occurred_at", ascending: false },
            limit: 10
          })
        ]);

        state.sessions = sessions || [];
        state.recentCritical = critical || [];
        applyFilters();
        renderApp();
      } catch (error) {
        app.innerHTML = `
          <div class="loading panel">
            <div style="color: var(--critical); font-weight: 700; margin-bottom: 10px">Khong tai duoc dashboard.</div>
            <div>${escapeHtml(error.message || String(error))}</div>
            <div class="tiny" style="margin-top: 10px">Hay chay migration trong Supabase SQL Editor truoc khi mo dashboard.</div>
          </div>
        `;
      }
    }

    function setSearch(value) {
      state.search = value;
      renderApp();
    }

    function setStatus(value) {
      state.status = value;
      renderApp();
    }

    function setRisk(value) {
      state.risk = value;
      renderApp();
    }

    async function showDetail(sessionId) {
      const session = state.sessions.find((item) => item.session_id === sessionId);
      if (!session) return;

      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal">
          <div class="loading">
            <div class="spinner"></div>
            <div>Dang tai timeline violation...</div>
          </div>
        </div>
      `;
      overlay.onclick = (event) => {
        if (event.target === overlay) overlay.remove();
      };
      document.body.appendChild(overlay);

      try {
        const violations = await supabaseSelect("exam_violations", {
          filters: {
            session_id: `eq.${sessionId}`
          },
          order: { column: "occurred_at", ascending: true }
        });

        const typeCounts = {};
        const severityCounts = { low: 0, medium: 0, high: 0, critical: 0 };

        for (const violation of violations) {
          typeCounts[violation.event_type] = (typeCounts[violation.event_type] || 0) + 1;
          severityCounts[violation.severity] = (severityCounts[violation.severity] || 0) + 1;
        }

        overlay.querySelector(".modal").innerHTML = `
          <div class="modal-head">
            <div>
              <div class="eyebrow">Session Detail</div>
              <h2 style="margin:14px 0 8px; font-size: 30px">${escapeHtml(session.user_name || "Candidate")}</h2>
              <div class="tiny">${escapeHtml(session.user_email || "Khong co email")} | ${escapeHtml(session.session_id)}</div>
            </div>
            <button class="button secondary" onclick="this.closest('.modal-overlay').remove()">Dong</button>
          </div>

          <div class="detail-stats">
            <div class="detail-stat">
              <div class="tiny">Trang thai</div>
              <div class="value"><span class="badge ${statusClass(session.status)}">${escapeHtml(session.status)}</span></div>
            </div>
            <div class="detail-stat">
              <div class="tiny">Duration</div>
              <div class="value">${formatDuration(session)}</div>
            </div>
            <div class="detail-stat">
              <div class="tiny">Tong violation</div>
              <div class="value">${violations.length}</div>
            </div>
            <div class="detail-stat">
              <div class="tiny">Tab switch</div>
              <div class="value">${session.tab_switch_count || 0}</div>
            </div>
          </div>

          <div class="modal-grid">
            <section class="detail-card">
              <div class="section-title" style="margin-bottom: 14px">Severity Breakdown</div>
              <div class="breakdown">
                ${Object.entries(severityCounts).map(([severity, count]) => `
                  <div class="row-item">
                    <div style="display:flex;align-items:center;gap:10px">
                      <span class="badge ${severityClass(severity)}">${escapeHtml(severity)}</span>
                      <span>${escapeHtml(EVENT_LABELS[`severity_${severity}`] || severity)}</span>
                    </div>
                    <strong class="mono">${count}</strong>
                  </div>
                `).join("")}
              </div>
            </section>

            <section class="detail-card">
              <div class="section-title" style="margin-bottom: 14px">Type Breakdown</div>
              <div class="breakdown">
                ${Object.keys(typeCounts).length === 0 ? `
                  <div class="empty" style="padding: 20px">Khong co violation nao trong session nay.</div>
                ` : Object.entries(typeCounts)
                  .sort((a, b) => b[1] - a[1])
                  .map(([type, count]) => `
                    <div class="row-item">
                      <span>${escapeHtml(EVENT_LABELS[type] || type)}</span>
                      <strong class="mono">${count}</strong>
                    </div>
                  `).join("")}
              </div>
            </section>
          </div>

          <section class="detail-card">
            <div class="section-title" style="margin-bottom: 14px">Timeline</div>
            <div class="timeline">
              ${violations.length === 0 ? `
                <div class="empty" style="padding: 26px">Khong tim thay violation nao cho session nay.</div>
              ` : violations.map((violation) => `
                <div class="timeline-item">
                  <div class="mono">${formatTime(violation.occurred_at)}</div>
                  <div><span class="badge ${severityClass(violation.severity)}">${escapeHtml(violation.severity)}</span></div>
                  <div class="timeline-message">
                    <strong>${escapeHtml(EVENT_LABELS[violation.event_type] || violation.event_type)}</strong>
                    <span class="tiny">${escapeHtml(violation.message || "Khong co message bo sung")}</span>
                    ${violation.metadata ? `<div class="timeline-meta">${escapeHtml(JSON.stringify(violation.metadata, null, 2))}</div>` : ""}
                  </div>
                  <div>
                    ${violation.video_url ? `<a class="video-link" href="${escapeHtml(violation.video_url)}" target="_blank" rel="noopener noreferrer">Mo video</a>` : '<span class="tiny">Khong co clip</span>'}
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      } catch (error) {
        overlay.querySelector(".modal").innerHTML = `
          <div class="modal-head">
            <div>
              <h2 style="margin:0">Session Detail</h2>
              <div class="tiny">${escapeHtml(sessionId)}</div>
            </div>
            <button class="button secondary" onclick="this.closest('.modal-overlay').remove()">Dong</button>
          </div>
          <div class="empty">${escapeHtml(error.message || String(error))}</div>
        `;
      }
    }

    setInterval(loadData, 30_000);
    loadData();
  </script>
</body>
</html>
